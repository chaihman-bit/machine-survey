<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏭 Machine Survey Form</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --navy:#0D1B2A; --steel:#1B3A5C; --orange:#E87722;
  --orange-l:#F4A55A; --light:#EEF4FB; --white:#FFFFFF;
  --gray:#F5F5F5; --gray-d:#888; --text:#1A1A2E;
  --green:#1D6E3F; --green-l:#D6F0E0;
  --yellow:#856404; --yellow-l:#FFF3CD;
  --red:#8B1A1A; --red-l:#FFE0E0;
  --blue:#1B3A5C; --blue-l:#EEF4FB;
  --border:#DDE4EE; --radius:12px;
}

body {
  font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #F0F4FA;
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: var(--navy);
  padding: 16px 20px;
  position: sticky; top:0; z-index:100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.header-inner { max-width:680px; margin:0 auto; display:flex; align-items:center; gap:12px; }
.header-icon { font-size:24px; }
.header-text h1 { font-size:16px; font-weight:700; color:#fff; }
.header-text p { font-size:11px; color:var(--orange-l); margin-top:2px; }
.machine-count {
  margin-left:auto; background:var(--orange); color:#fff;
  font-size:12px; font-weight:700; padding:4px 12px;
  border-radius:100px; white-space:nowrap;
}

/* ── Progress ── */
.progress-wrap { background:var(--steel); height:3px; }
.progress-bar { height:3px; background:var(--orange); transition:width .3s; width:0%; }

/* ── Main ── */
main { max-width:680px; margin:0 auto; padding:16px; }

/* ── Meta Card ── */
.meta-card {
  background:#fff; border-radius:var(--radius); padding:16px;
  margin-bottom:16px; border:1px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.meta-card h2 { font-size:13px; font-weight:700; color:var(--steel); margin-bottom:12px;
  display:flex; align-items:center; gap:6px; }
.meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* ── Labels & Inputs ── */
label { display:block; font-size:12px; font-weight:600; color:var(--steel); margin-bottom:5px; }
input, select, textarea {
  width:100%; padding:11px 14px; font-size:14px;
  border:1.5px solid var(--border); border-radius:8px;
  background:#fff; color:var(--text); font-family:inherit;
  transition:border-color .2s, box-shadow .2s;
  -webkit-appearance:none; appearance:none;
}
input:focus, select:focus, textarea:focus {
  outline:none; border-color:var(--orange);
  box-shadow:0 0 0 3px rgba(232,119,34,0.12);
}
textarea { min-height:70px; resize:vertical; }
.full { grid-column:1/-1; }

/* ── Machine Card ── */
.machine-card {
  background:#fff; border-radius:var(--radius);
  border:1.5px solid var(--border);
  margin-bottom:16px; overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  transition:border-color .2s;
}
.machine-card.has-action { border-color:var(--orange); }

.card-header {
  display:flex; align-items:center; padding:12px 16px;
  background:var(--navy); gap:10px; cursor:pointer;
}
.card-id {
  background:var(--orange); color:#fff; font-size:11px; font-weight:700;
  padding:3px 10px; border-radius:100px;
}
.card-title { color:#fff; font-size:14px; font-weight:600; flex:1; }
.card-action-badge {
  font-size:11px; font-weight:700; padding:3px 10px; border-radius:100px;
  display:none;
}
.card-action-badge.show { display:block; }
.badge-move  { background:var(--green-l);  color:var(--green); }
.badge-sell  { background:var(--yellow-l); color:var(--yellow); }
.badge-scrap { background:var(--red-l);    color:var(--red); }
.badge-new   { background:var(--blue-l);   color:var(--blue); }
.card-toggle { color:#fff; font-size:18px; transition:transform .3s; }
.card-toggle.open { transform:rotate(180deg); }

.card-body { padding:16px; display:none; }
.card-body.open { display:block; }

.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-row { display:flex; flex-direction:column; }

/* ── Action Selector ── */
.action-selector { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.action-btn {
  padding:10px 4px; border:2px solid var(--border); border-radius:8px;
  background:#fff; font-size:11px; font-weight:700; text-align:center;
  cursor:pointer; transition:all .2s; line-height:1.3;
}
.action-btn:hover { border-color:var(--orange); background:var(--gray); }
.action-btn.selected-move  { border-color:var(--green);  background:var(--green-l);  color:var(--green); }
.action-btn.selected-sell  { border-color:var(--yellow); background:var(--yellow-l); color:var(--yellow); }
.action-btn.selected-scrap { border-color:var(--red);    background:var(--red-l);    color:var(--red); }
.action-btn.selected-new   { border-color:var(--blue);   background:var(--blue-l);   color:var(--blue); }

/* ── Condition Stars ── */
.condition-row { display:flex; gap:8px; flex-wrap:wrap; }
.cond-btn {
  padding:8px 14px; border:1.5px solid var(--border); border-radius:100px;
  background:#fff; font-size:12px; font-weight:600; cursor:pointer;
  transition:all .2s; white-space:nowrap;
}
.cond-btn:hover { border-color:var(--orange); }
.cond-btn.sel { background:var(--orange); border-color:var(--orange); color:#fff; }

/* ── Risk Flags ── */
.risk-flags { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.risk-flag {
  display:flex; align-items:center; gap:8px;
  padding:10px 12px; border:1.5px solid var(--border);
  border-radius:8px; cursor:pointer; transition:all .2s;
  font-size:12px; user-select:none;
}
.risk-flag:hover { border-color:var(--orange); background:var(--gray); }
.risk-flag.flagged { border-color:#D97706; background:#FEF3C7; color:#92400E; }
.risk-flag .rf-icon { font-size:16px; }
.risk-flag .rf-chk { margin-left:auto; font-size:14px; }

/* ── Add Machine Button ── */
.add-btn {
  width:100%; padding:14px; background:#fff; border:2px dashed var(--orange);
  border-radius:var(--radius); color:var(--orange); font-size:14px;
  font-weight:700; cursor:pointer; text-align:center;
  transition:all .2s; margin-bottom:16px; font-family:inherit;
}
.add-btn:hover { background:rgba(232,119,34,0.06); }

/* ── Export Section ── */
.export-section {
  background:#fff; border-radius:var(--radius); padding:16px;
  border:1px solid var(--border); margin-bottom:24px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.export-section h2 { font-size:13px; font-weight:700; color:var(--steel);
  margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.export-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.export-btn {
  padding:12px; border:none; border-radius:8px;
  font-size:13px; font-weight:700; cursor:pointer;
  font-family:inherit; transition:all .2s;
}
.btn-csv { background:var(--navy); color:#fff; }
.btn-csv:hover { background:var(--steel); }
.btn-print { background:var(--orange); color:#fff; }
.btn-print:hover { opacity:.9; }

/* ── Summary Bar ── */
.summary-bar {
  background:var(--navy); border-radius:var(--radius); padding:14px 16px;
  margin-bottom:16px; display:grid; grid-template-columns:repeat(4,1fr);
  gap:8px; text-align:center;
}
.sum-item .num { font-size:22px; font-weight:700; color:var(--orange); }
.sum-item .lbl { font-size:10px; color:#aaa; margin-top:2px; }
.sum-move .num  { color:#6EE7A0; }
.sum-sell .num  { color:#FCD34D; }
.sum-scrap .num { color:#FCA5A5; }

/* ── Toast ── */
.toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background:var(--navy); color:#fff; padding:10px 20px; border-radius:100px;
  font-size:13px; font-weight:600; z-index:999;
  opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; }

/* ── Responsive ── */
@media (max-width:480px) {
  .meta-grid { grid-template-columns:1fr; }
  .form-grid { grid-template-columns:1fr; }
  .action-selector { grid-template-columns:repeat(2,1fr); }
  .export-btns { grid-template-columns:1fr; }
  .risk-flags { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-icon">🏭</div>
    <div class="header-text">
      <h1>Machine Inventory Survey</h1>
      <p>แบบฟอร์มสำรวจเครื่องจักร — กรอกในสนาม</p>
    </div>
    <div class="machine-count" id="machineCount">0 เครื่อง</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
</div>

<main>

  <!-- Summary Bar -->
  <div class="summary-bar" id="summaryBar">
    <div class="sum-item"><div class="num" id="sumTotal">0</div><div class="lbl">ทั้งหมด</div></div>
    <div class="sum-item sum-move"><div class="num" id="sumMove">0</div><div class="lbl">🟢 MOVE</div></div>
    <div class="sum-item sum-sell"><div class="num" id="sumSell">0</div><div class="lbl">🟡 SELL</div></div>
    <div class="sum-item sum-scrap"><div class="num" id="sumScrap">0</div><div class="lbl">🔴 SCRAP</div></div>
  </div>

  <!-- Meta Info -->
  <div class="meta-card">
    <h2>📋 ข้อมูลการสำรวจ</h2>
    <div class="meta-grid">
      <div class="form-row">
        <label>วันที่สำรวจ</label>
        <input type="date" id="surveyDate">
      </div>
      <div class="form-row">
        <label>ผู้สำรวจ</label>
        <input type="text" id="surveyBy" placeholder="ชื่อ-สกุล">
      </div>
      <div class="form-row">
        <label>แผนก / Zone</label>
        <input type="text" id="surveyDept" placeholder="เช่น Production A">
      </div>
      <div class="form-row">
        <label>อาคาร</label>
        <input type="text" id="surveyBuilding" placeholder="เช่น อาคาร 2">
      </div>
    </div>
  </div>

  <!-- Machine Cards Container -->
  <div id="machineList"></div>

  <!-- Add Machine Button -->
  <button class="add-btn" onclick="addMachine()">＋ เพิ่มเครื่องจักร</button>

  <!-- Export Section -->
  <div class="export-section">
    <h2>📤 บันทึกและ Export ข้อมูล</h2>

    <!-- Primary: Save to Sheets -->
    <button class="export-btn btn-sheets" onclick="saveToSheets()" id="saveBtn"
      style="width:100%;margin-bottom:10px;background:#1D6E3F;color:#fff;
             font-size:15px;padding:16px;border-radius:10px;border:none;
             font-family:inherit;font-weight:700;cursor:pointer;
             display:flex;align-items:center;justify-content:center;gap:10px;">
      <span>📊</span>
      <span>บันทึกข้อมูลเข้า Google Sheets<br><small style="font-weight:400;font-size:12px">ส่งข้อมูลทั้งหมดไปยัง Dashboard PM</small></span>
    </button>

    <!-- Status Box -->
    <div id="saveStatus" style="display:none;margin-bottom:10px;padding:12px 16px;
      border-radius:8px;font-size:13px;font-weight:600;text-align:center;"></div>

    <div class="export-btns">
      <button class="export-btn btn-csv" onclick="exportCSV()">⬇ Export CSV<br><small style="font-weight:400">สำรองข้อมูล</small></button>
      <button class="export-btn btn-print" onclick="window.print()">🖨 พิมพ์รายงาน<br><small style="font-weight:400">สรุปทั้งหมด</small></button>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbznn80aMHoWfYFF-V6vSeagYaV0dcSlCA4ffObWRJ9cwAzYYwtjGWwZHtif9ks921U/exec";

let machines = [];
let machineCounter = 0;

// Auto-set today's date
document.getElementById('surveyDate').value = new Date().toISOString().split('T')[0];

function addMachine() {
  machineCounter++;
  const id = `M-${String(machineCounter).padStart(3,'0')}`;
  const machine = { id, name:'', brand:'', model:'', serial:'', year:'',
    condition:'', action:'', width:'', depth:'', height:'', weight:'',
    utility:'', value:'', note:'', risks:[] };
  machines.push(machine);
  renderMachine(machine, machines.length - 1);
  updateSummary();
  // Scroll to new card
  setTimeout(() => {
    const cards = document.querySelectorAll('.machine-card');
    cards[cards.length-1].scrollIntoView({behavior:'smooth',block:'center'});
  }, 100);
}

function renderMachine(m, idx) {
  const list = document.getElementById('machineList');
  const div = document.createElement('div');
  div.className = 'machine-card';
  div.id = `card-${m.id}`;

  const conditions = ['ดีมาก','ดี','พอใช้','เสื่อมสภาพ','รอซ่อม'];
  const condBtns = conditions.map(c =>
    `<button class="cond-btn${m.condition===c?' sel':''}" onclick="setCondition('${m.id}','${c}',this)">${c}</button>`
  ).join('');

  const actions = [
    {key:'MOVE-ย้าย',  cls:'move',  label:'🟢 MOVE<br>ย้ายตาม'},
    {key:'SELL-ขาย',   cls:'sell',  label:'🟡 SELL<br>ขายออก'},
    {key:'SCRAP-ทิ้ง', cls:'scrap', label:'🔴 SCRAP<br>ทิ้ง'},
    {key:'NEW-ซื้อใหม่',cls:'new',  label:'🔵 NEW<br>ซื้อใหม่'},
  ];
  const actionBtns = actions.map(a =>
    `<button class="action-btn${m.action===a.key?' selected-'+a.cls:''}" 
      onclick="setAction('${m.id}','${a.key}','${a.cls}',this)">${a.label}</button>`
  ).join('');

  const riskItems = [
    {key:'heavy',    icon:'⚖️',  label:'น้ำหนักมาก >500kg'},
    {key:'specialist',icon:'👨‍🔧', label:'ต้อง Specialist'},
    {key:'foundation',icon:'⚓', label:'มี Foundation/Anchor'},
    {key:'liquid',   icon:'💧',  label:'มีของเหลวในเครื่อง'},
    {key:'calibrate',icon:'🎯',  label:'ต้อง Recalibrate'},
    {key:'permit',   icon:'📄',  label:'ต้องขอ Permit ขนส่ง'},
  ];
  const riskBtns = riskItems.map(r =>
    `<div class="risk-flag${m.risks.includes(r.key)?' flagged':''}" onclick="toggleRisk('${m.id}','${r.key}',this)">
      <span class="rf-icon">${r.icon}</span>
      <span>${r.label}</span>
      <span class="rf-chk">${m.risks.includes(r.key)?'✓':''}</span>
    </div>`
  ).join('');

  const actionBadgeClass = m.action ? 'badge-'+m.action.split('-')[0].toLowerCase()+' show' : '';

  div.innerHTML = `
    <div class="card-header" onclick="toggleCard('${m.id}')">
      <span class="card-id">${m.id}</span>
      <span class="card-title" id="title-${m.id}">${m.name || 'ชื่อเครื่องจักร...'}</span>
      <span class="card-action-badge ${actionBadgeClass}" id="badge-${m.id}">
        ${m.action||''}
      </span>
      <span class="card-toggle open" id="toggle-${m.id}">▾</span>
    </div>
    <div class="card-body open" id="body-${m.id}">
      <div class="form-grid">
        <div class="form-row full">
          <label>ชื่อเครื่องจักร *</label>
          <input type="text" placeholder="เช่น เครื่องปั๊มไฮดรอลิก" value="${m.name}"
            oninput="updateField('${m.id}','name',this.value); document.getElementById('title-${m.id}').textContent=this.value||'ชื่อเครื่องจักร...'">
        </div>
        <div class="form-row">
          <label>ยี่ห้อ / Brand</label>
          <input type="text" placeholder="เช่น Mitsubishi" value="${m.brand}"
            oninput="updateField('${m.id}','brand',this.value)">
        </div>
        <div class="form-row">
          <label>รุ่น / Model</label>
          <input type="text" placeholder="Model number" value="${m.model}"
            oninput="updateField('${m.id}','model',this.value)">
        </div>
        <div class="form-row">
          <label>Serial No.</label>
          <input type="text" placeholder="SN-XXXXXXX" value="${m.serial}"
            oninput="updateField('${m.id}','serial',this.value)">
        </div>
        <div class="form-row">
          <label>ปีที่ผลิต</label>
          <input type="number" placeholder="2015" min="1980" max="2025" value="${m.year}"
            oninput="updateField('${m.id}','year',this.value)">
        </div>
      </div>

      <div style="margin:14px 0">
        <label style="margin-bottom:8px">สภาพเครื่องจักร (Condition)</label>
        <div class="condition-row" id="cond-${m.id}">${condBtns}</div>
      </div>

      <div style="margin-bottom:14px">
        <label style="margin-bottom:8px">ตัดสินใจ (Action) *</label>
        <div class="action-selector">${actionBtns}</div>
      </div>

      <div class="form-grid" style="margin-bottom:14px">
        <div class="form-row">
          <label>ขนาด กว้าง × ลึก × สูง (ม.)</label>
          <input type="text" placeholder="1.2 × 0.8 × 1.5" value="${m.width}"
            oninput="updateField('${m.id}','width',this.value)">
        </div>
        <div class="form-row">
          <label>น้ำหนัก (กก.)</label>
          <input type="number" placeholder="500" value="${m.weight}"
            oninput="updateField('${m.id}','weight',this.value)">
        </div>
        <div class="form-row">
          <label>Utility ที่ใช้</label>
          <select onchange="updateField('${m.id}','utility',this.value)">
            <option value="">-- เลือก --</option>
            ${['ไฟฟ้า','น้ำ','แก๊ส','Compressed Air','ไฟ+น้ำ','ไฟ+แก๊ส','อื่นๆ']
              .map(u=>`<option${m.utility===u?' selected':''}>${u}</option>`).join('')}
          </select>
        </div>
        <div class="form-row">
          <label>มูลค่าทางบัญชี (฿)</label>
          <input type="number" placeholder="50000" value="${m.value}"
            oninput="updateField('${m.id}','value',this.value)">
        </div>
      </div>

      <div style="margin-bottom:14px">
        <label style="margin-bottom:8px">⚠️ Risk Flags (เลือกทุกข้อที่ใช่)</label>
        <div class="risk-flags">${riskBtns}</div>
      </div>

      <div class="form-row" style="margin-bottom:14px">
        <label>หมายเหตุ</label>
        <textarea placeholder="ข้อมูลเพิ่มเติม, สภาพพิเศษ, ข้อควรระวัง..." 
          oninput="updateField('${m.id}','note',this.value)">${m.note}</textarea>
      </div>

      <button onclick="removeMachine('${m.id}')" 
        style="background:none;border:1px solid #ddd;color:#999;padding:8px 16px;
               border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;">
        🗑 ลบรายการนี้
      </button>
    </div>`;

  list.appendChild(div);
}

function toggleCard(id) {
  const body = document.getElementById(`body-${id}`);
  const toggle = document.getElementById(`toggle-${id}`);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

function updateField(id, field, val) {
  const m = machines.find(x => x.id === id);
  if (m) m[field] = val;
  saveLocal();
}

function setCondition(id, val, el) {
  const m = machines.find(x => x.id === id);
  if (!m) return;
  m.condition = val;
  el.closest('.condition-row').querySelectorAll('.cond-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  saveLocal(); updateSummary();
}

function setAction(id, val, cls, el) {
  const m = machines.find(x => x.id === id);
  if (!m) return;
  m.action = val;
  const card = document.getElementById(`card-${id}`);
  card.classList.add('has-action');
  el.closest('.action-selector').querySelectorAll('.action-btn')
    .forEach(b => b.className = 'action-btn');
  el.classList.add(`selected-${cls}`);
  const badge = document.getElementById(`badge-${id}`);
  badge.textContent = val;
  badge.className = `card-action-badge badge-${cls} show`;
  saveLocal(); updateSummary();
  showToast(`✓ ${val}`);
}

function toggleRisk(id, key, el) {
  const m = machines.find(x => x.id === id);
  if (!m) return;
  const i = m.risks.indexOf(key);
  if (i > -1) {
    m.risks.splice(i,1); el.classList.remove('flagged');
    el.querySelector('.rf-chk').textContent = '';
  } else {
    m.risks.push(key); el.classList.add('flagged');
    el.querySelector('.rf-chk').textContent = '✓';
  }
  saveLocal();
}

function removeMachine(id) {
  if (!confirm('ลบเครื่องจักรนี้?')) return;
  machines = machines.filter(m => m.id !== id);
  document.getElementById(`card-${id}`)?.remove();
  updateSummary(); saveLocal();
}

function updateSummary() {
  const total = machines.length;
  const move  = machines.filter(m => m.action.startsWith('MOVE')).length;
  const sell  = machines.filter(m => m.action.startsWith('SELL')).length;
  const scrap = machines.filter(m => m.action.startsWith('SCRAP')).length;

  document.getElementById('sumTotal').textContent = total;
  document.getElementById('sumMove').textContent  = move;
  document.getElementById('sumSell').textContent  = sell;
  document.getElementById('sumScrap').textContent = scrap;
  document.getElementById('machineCount').textContent = `${total} เครื่อง`;

  const filled = machines.filter(m => m.name && m.action).length;
  const pct = total > 0 ? Math.round(filled/total*100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function exportCSV() {
  const meta = {
    date: document.getElementById('surveyDate').value,
    by:   document.getElementById('surveyBy').value,
    dept: document.getElementById('surveyDept').value,
    bldg: document.getElementById('surveyBuilding').value,
  };

  const headers = ['Asset ID','ชื่อเครื่องจักร','ยี่ห้อ','รุ่น','Serial No.',
    'ปีที่ผลิต','อายุ (ปี)','สภาพ','Action','ขนาด','น้ำหนัก (กก.)',
    'Utility','มูลค่า (฿)','Risk Flags','หมายเหตุ',
    'วันที่สำรวจ','ผู้สำรวจ','แผนก','อาคาร'];

  const rows = machines.map(m => {
    const age = m.year ? (2025 - parseInt(m.year)) : '';
    return [
      m.id, m.name, m.brand, m.model, m.serial,
      m.year, age, m.condition, m.action,
      m.width, m.weight, m.utility, m.value,
      m.risks.join('/'), m.note,
      meta.date, meta.by, meta.dept, meta.bldg
    ].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',');
  });

  const bom = '\uFEFF';
  const csv = bom + [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `Machine_Survey_${meta.date||'data'}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('✓ Export CSV สำเร็จ');
}


function saveToSheets() {
  const total = machines.length;
  if (total === 0) {
    showStatus("error", "⚠️ ยังไม่มีข้อมูลเครื่องจักร กรุณาเพิ่มอย่างน้อย 1 เครื่อง");
    return;
  }

  const incomplete = machines.filter(m => !m.name || !m.action);
  if (incomplete.length > 0) {
    showStatus("warn", `⚠️ ยังมี ${incomplete.length} เครื่องที่ยังไม่ได้กรอกชื่อหรือ Action — กด Save อีกครั้งเพื่อบันทึกทั้งหมด`);
  }

  const meta = {
    date:     document.getElementById("surveyDate").value,
    by:       document.getElementById("surveyBy").value,
    dept:     document.getElementById("surveyDept").value,
    building: document.getElementById("surveyBuilding").value,
  };

  const payload = {
    meta,
    machines: machines.map(m => ({
      id: m.id, name: m.name, brand: m.brand, model: m.model,
      serial: m.serial, year: m.year, condition: m.condition,
      action: m.action, size: m.width, weight: m.weight,
      utility: m.utility, value: m.value,
      risks: m.risks || [], note: m.note
    }))
  };

  const btn = document.getElementById("saveBtn");
  btn.style.opacity = "0.6";
  btn.style.pointerEvents = "none";
  showStatus("loading", "⏳ กำลังบันทึกข้อมูลเข้า Google Sheets...");

  fetch(SHEETS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(() => {
    showStatus("success", `✅ บันทึกสำเร็จ! ${total} เครื่องจักรถูกส่งเข้า Google Sheets แล้ว`);
    showToast("✅ บันทึกเข้า Google Sheets สำเร็จ!");
  })
  .catch(err => {
    showStatus("error", "❌ เกิดข้อผิดพลาด: " + err.message + " — ลอง Export CSV แทนได้ครับ");
  })
  .finally(() => {
    btn.style.opacity = "1";
    btn.style.pointerEvents = "auto";
  });
}

function showStatus(type, msg) {
  const el = document.getElementById("saveStatus");
  el.style.display = "block";
  const base = "padding:12px 16px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;border:1.5px solid;";
  const styles = {
    loading: base + "background:#EEF4FB;color:#1B3A5C;border-color:#C8D4E0",
    success: base + "background:#D6F0E0;color:#1D6E3F;border-color:#6EE7A0",
    warn:    base + "background:#FFF3CD;color:#856404;border-color:#FCD34D",
    error:   base + "background:#FFE0E0;color:#8B1A1A;border-color:#FCA5A5",
  };
  el.style.cssText = styles[type] || styles.loading;
  el.textContent = msg;
}

function saveLocal() {
  try {
    sessionStorage.setItem('machineData', JSON.stringify(machines));
  } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

addMachine();
